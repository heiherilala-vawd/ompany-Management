components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  responses:
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestException'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotAuthorizedException'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResourceNotFoundException'
    '429':
      description: Too many requests to the API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TooManyRequestsException'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InternalServerException'

  schemas:
    # =========================
    # ENUMS
    # =========================
    CompanyType:
      type: string
      enum:
        - BTP
        - HOTEL
    EntityType:
      type: string
      enum:
        - USER
        - COMPANY
        - JOB
        - WAREHOUSE
        - EQUIPMENT
        - MATERIAL
        - INCOMEMONEY
        - EXPENSEMONEY
        - EMPLOYEE_PAYMENT
        - TRAVEL_EXPENSE
        - TRAVELPEOPLE
        - TRAVELMATERIALS
        - TRAVELEQUIPMENT
        - PURCHASE
        - BANK_FEE
        - OTHER_EXPENSE
    JobStatus:
      type: string
      enum:
        - PENDING_SIGNATURE
        - IN_PROGRESS
        - COMPLETED
    PaymentType:
      type: string
      enum:
        - ADVANCE
        - MONTHLY
        - OTHER
    TransportStatus:
      type: string
      enum:
        - IN_PROGRESS
        - LOST
        - ARRIVED
    Sex:
      type: string
      enum:
        - M
        - F
    Role:
      type: string
      enum:
        - ADMIN
        - WAREHOUSE_WORKER
        - EMPLOYEE
        - ADMINISTRATION

    # =========================
    # COMMON
    # =========================
    comment:
      properties:
        comment:
          type: string
    AuditFields:
      allOf:
        - $ref: '#/components/schemas/comment'
      properties:
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
        updated_by:
          type: string

    # =========================
    # USER
    # =========================
    User:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
      properties:
        id:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        first_name:
          type: string
        last_name:
          type: string
        sex:
          $ref: '#/components/schemas/Sex'
        email:
          type: string
    CrupdateUser:
      allOf:
        - $ref: '#/components/schemas/comment'
      properties:
        id:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        first_name:
          type: string
        last_name:
          type: string
        sex:
          $ref: '#/components/schemas/Sex'
        email:
          type: string
        password:
          type: string

    # =========================
    # COMPANY
    # =========================
    Company:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
      properties:
        id:
          type: string
        name:
          type: string
        rib:
          type: string
        description:
          type: string
        company_type:
          $ref: '#/components/schemas/CompanyType'
    CrupdateCompany:
      allOf:
        - $ref: '#/components/schemas/comment'
      properties:
        id:
          type: string
        name:
          type: string
        rib:
          type: string
        description:
          type: string
        company_type:
          $ref: '#/components/schemas/CompanyType'

    # =========================
    # JOB
    # =========================
    Job:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
      properties:
        id:
          type: string
        company_id:
          type: string
        description:
          type: string
        contract_signature_date:
          type: string
          format: date
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/JobStatus'
    CrupdateJob:
      allOf:
        - $ref: '#/components/schemas/comment'
      properties:
        id:
          type: string
        company_id:
          type: string
        description:
          type: string
        contract_signature_date:
          type: string
          format: date
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/JobStatus'

    # =========================
    # WAREHOUSE
    # =========================
    Warehouse:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        job_id:
          type: string
    CrupdateWarehouse:
      allOf:
        - $ref: '#/components/schemas/comment'
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        job_id:
          type: string

    # =========================
