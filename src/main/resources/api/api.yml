  /companies/{comp_id}/jobs/{job_id}/users:
    get:
      tags:
        - Job
      summary: Get responsible users for a job
      operationId: getJobResponsibleUsers
      parameters:
        - name: comp_id
          in: path
          required: true
          schema:
            type: string
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of responsible users for the job
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
