  # =========================
  # HISTORY
  # =========================
  /histories:
    get:
      tags:
        - History
      summary: Get modification history with filters
      description: Retrieve the history of modifications with optional filters for user, entity type, entity id, and date range.
      operationId: getHistories
      parameters:
        - name: page
          in: query
          schema:
            $ref: '#/components/schemas/Page'
        - name: page_size
          in: query
          schema:
            $ref: '#/components/schemas/PageSize'
        - name: user_id
          in: query
          description: "Filter by user who made the modification"
          schema:
            type: string
        - name: entity_type
          in: query
          description: "Filter by entity type"
          schema:
            $ref: '#/components/schemas/EntityType'
        - name: entity_id
          in: query
          description: "Filter by entity identifier"
          schema:
            type: string
        - name: date_from
          in: query
          description: "Filter modifications from this date (inclusive)"
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          description: "Filter modifications until this date (inclusive)"
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of history entries
          content:
