        arrival_location:
          type: string
        departure_date:
          type: string
          format: date-time
        arrival_date:
          type: string
          format: date-time
    CrupdateTravelExpense:
      properties:
        id:
          type: string
        expense_id:
          type: string
        departure_location:
          type: string
        arrival_location:
