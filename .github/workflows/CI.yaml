name: CI - Tests et Analyse de Code

on:
  push:
    branches: [ "main", "prod" ]
  pull_request:
    branches: [ "prod" ]
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  # ============================================================
  # JOB 1 : TESTS ET COUVERTURE
  # ============================================================
  test:
    name: Tests et Couverture de code
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

# === AJOUTER CETTE ÉTAPE POUR TESTCONTAINERS ===
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 2. Installer JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      # 3. Rendre le script gradlew exécutable
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      # 4. Télécharger les dépendances
      - name: Download dependencies
        run: ./gradlew dependencies --no-daemon
      
      # 5. Exécuter les tests et générer le rapport JaCoCo
      - name: Run tests with JaCoCo
        run: ./gradlew test jacocoTestReport --no-daemon --info --stacktrace
      
      # 6. Vérifier les seuils de couverture
      - name: Check coverage thresholds
        run: ./gradlew jacocoTestCoverageVerification --no-daemon
      
      # 7. Upload du rapport JaCoCo (HTML) - pour visualisation
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/html/
          retention-days: 7
      
      # 8. Upload du rapport de test (HTML)
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7
      
      # 9. Upload du rapport JaCoCo XML (pour SonarQube)
      - name: Upload JaCoCo XML
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml
          path: build/reports/jacoco/jacocoTestReport.xml
          retention-days: 7
  
  # ============================================================
  # JOB 2 : ANALYSE DE CODE STATIQUE (Checkstyle)
  # ============================================================
  checkstyle:
    name: Checkstyle - Qualité du code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon
      
      - name: Upload Checkstyle report
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/
          retention-days: 7
  
  # ============================================================
  # JOB 3 : SPOTLESS (Formatage du code)
  # ============================================================
  spotless:
    name: Spotless - Formatage du code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Check code formatting
        run: ./gradlew spotlessCheck --no-daemon
  
  # ============================================================
  # JOB 4 : INTEGRATION AVEC SONARCLOUD (optionnel)
  # ============================================================