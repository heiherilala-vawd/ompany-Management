          type: string
        name:
          type: string
        description:
          type: string
        warehouse_id:
          type: string
        floor_number:
          type: integer
        storage_number:
          type: integer

    # =========================
    # MATERIAL
    # =========================
    Material:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        warehouse_id:
          type: string
        floor_number:
          type: integer
        storage_number:
          type: integer
    CrupdateMaterial:
      allOf:
