  # =========================
  # HISTORY
  # =========================
  /histories:
    get:
      tags:
        - History
      summary: Get modification history with filters
      description: Retrieve the history of modifications with optional filters for user, entity type, entity id, and date range.
      operationId: getHistories
      parameters:
        - name: page
          in: query
          schema:
            $ref: '#/components/schemas/Page'
          example: 1
        - name: page_size
          in: query
          schema:
            $ref: '#/components/schemas/PageSize'
          example: 20
        - name: user_id
          in: query
          description: "Filter by user who made the modification"
          schema:
            type: string
          example: "usr_123456"
        - name: entity_type
          in: query
          description: "Filter by entity type"
          schema:
            $ref: '#/components/schemas/EntityType'
          example: "JOB"
        - name: entity_id
          in: query
          description: "Filter by entity identifier"
          schema:
            type: string
          example: "job_001"
        - name: date_from
          in: query
          description: "Filter modifications from this date (inclusive)"
          schema:
            type: string
            format: date-time
          example: "2024-02-01T00:00:00Z"
        - name: date_to
          in: query
          description: "Filter modifications until this date (inclusive)"
          schema:
            type: string
            format: date-time
          example: "2024-02-29T23:59:59Z"
      responses:
        '200':
          description: List of history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/History'
              example:
                - id: "hist_001"
                  previous_value: '{"status":"PENDING_SIGNATURE"}'
                  new_value: '{"status":"IN_PROGRESS"}'
                  user_id: "usr_123456"
                  modified_at: "2024-02-01T09:00:00Z"
                  entity_type: "JOB"
                  entity_id: "job_001"
                - id: "hist_002"
                  previous_value: '{"amount":15000}'
                  new_value: '{"amount":16200}'
                  user_id: "usr_123456"
                  modified_at: "2024-02-22T14:30:00Z"
                  entity_type: "EXPENSEMONEY"
                  entity_id: "exp_001"
        '400':
          $ref: '#/components/responses/400'
        '403':
