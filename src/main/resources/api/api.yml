          in: query
          schema:
            $ref: '#/components/schemas/Page'
        - name: page_size
          in: query
          schema:
            $ref: '#/components/schemas/PageSize'
        - name: name
          in: query
          description: "Filter companies by name, case is ignored"
          schema:
            type: string
        - name: rib
          in: query
          description: "Filter companies by RIB, case is ignored"
          schema:
            type: string
        - name: description
          in: query
          description: "Filter companies by description, case is ignored"
          schema:
            type: string
        - name: company_type
          in: query
          description: "Filter by company type"
          schema:
            $ref: '#/components/schemas/CompanyType'
      responses:
        '200':
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    put:
      tags:
        - Company
      summary: Create new companies or update existing companies
      operationId: crupdateCompanies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CrupdateCompany'
      responses:
        '200':
          description: The created or updated companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'


  # =========================
  # JOB
  # =========================
  '/companies/{comp_id}/jobs/{id}':
