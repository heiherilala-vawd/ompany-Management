openapi: 3.0.3
info:
  version: '1.0'
  title: Company Management API
  description: |
    API CRUD pour la gestion des entreprises, chantiers, entrepôts, équipements, matériaux,
    mouvements financiers, dépenses, achats et frais de transport.
    Basée sur le schéma de base de données fourni.

servers:
  - url: 'https://api-dev.company.com'
  - url: 'https://api-prod.company.com'

security:
  - BearerAuth: [ ]

paths:

  # =========================
  # USERS
  # =========================
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrupdateUser'
            example:
              first_name: "Jean"
              last_name: "Dupont"
              email: "jean.dupont@example.com"
              password: "securePassword123"
              role: "EMPLOYEE"
              sex: "M"
              comment: "Nouvel employé en CDI"
      responses:
        '200':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                type: "Bearer"
                id: "usr_123456"
                email: "jean.dupont@example.com"
                role: "EMPLOYEE"
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'


  # =========================
  # USERS
  # =========================
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "jean.dupont@example.com"
              password: "securePassword123"
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                type: "Bearer"
                id: "usr_123456"
                email: "jean.dupont@example.com"
                role: "EMPLOYEE"
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'

  # =========================
  # whoami
  # =========================
  /auth/whoami:
    get:
      tags:
        - Auth
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                type: "Bearer"
                id: "usr_123456"
                email: "jean.dupont@example.com"
                role: "EMPLOYEE"
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'


  # =========================
  # USERS
  # =========================
  '/users/{id}':
    get:
      tags:
        - Users
      summary: Get user by identifier
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "usr_123456"
      responses:
        '200':
          description: The identified user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: "usr_123456"
                first_name: "Jean"
                last_name: "Dupont"
                email: "jean.dupont@example.com"
                role: "EMPLOYEE"
                sex: "M"
                comment: "Nouvel employé en CDI"
                created_at: "2024-01-15T09:30:00Z"
                updated_at: "2024-01-15T09:30:00Z"
                created_by:
                  id: "usr_admin001"
                  role: "ADMIN"
                  first_name: "Admin"
                  last_name: "System"
                  sex: "F"
                  email: "admin@company.com"
                updated_by:
                  id: "usr_admin001"
                  role: "ADMIN"
                  first_name: "Admin"
                  last_name: "System"
                  sex: "F"
                  email: "admin@company.com"
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    delete:
      tags:
        - Users
      summary: Delete a user by identifier
      operationId: deleteUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "usr_123456"
      responses:
        '204':
          description: User deleted successfully
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      operationId: getUsers
      parameters:
        - name: page
          in: query
          schema:
            $ref: '#/components/schemas/Page'
          example: 1
        - name: page_size
          in: query
          schema:
            $ref: '#/components/schemas/PageSize'
          example: 20
        - name: first_name
          in: query
          description: "Filter users by first name, case is ignored"
          schema:
            type: string
          example: "Jean"
        - name: last_name
          in: query
          description: "Filter users by last name, case is ignored"
          schema:
            type: string
          example: "Dupont"
        - name: email
          in: query
          description: "Filter users by email, case is ignored"
          schema:
            type: string
          example: "jean.dupont@example.com"
        - name: role
          in: query
          description: "Filter users by role"
          schema:
            $ref: '#/components/schemas/Role'
          example: "EMPLOYEE"
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - id: "usr_123456"
                  first_name: "Jean"
                  last_name: "Dupont"
                  email: "jean.dupont@example.com"
                  role: "EMPLOYEE"
                  sex: "M"
