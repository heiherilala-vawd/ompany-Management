# Stratégie de connexion Docker
docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy

# Pour Windows avec Docker Desktop (par défaut)
docker.host=unix:///var/run/docker.sock

# Pour Windows avec WSL2 (décommentez si nécessaire)
# docker.host=tcp://localhost:2375

# Pour Windows avec Docker Desktop via named pipe (ancienne version)
# docker.host=npipe:////./pipe/docker_engine

# Désactiver la vérification de l'environnement Docker
ryuk.disabled=false

# Réutiliser les conteneurs entre les tests
testcontainers.reuse.enable=true
