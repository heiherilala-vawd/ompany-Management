      summary: Get all equipment
      operationId: getEquipment
      parameters:
        - name: comp_id
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            $ref: '#/components/schemas/Page'
        - name: page_size
          in: query
          schema:
            $ref: '#/components/schemas/PageSize'
        - name: warehouse_id
          in: query
          schema:
            type: string
        - name: name
          in: query
          description: "Filter equipment by name, case is ignored"
          schema:
            type: string
        - name: description
          in: query
          description: "Filter equipment by description, case is ignored"
          schema:
            type: string
        - name: floor_number
          in: query
          schema:
            type: integer
        - name: storage_number
          in: query
