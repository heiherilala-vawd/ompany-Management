          type: string
        material:
          type: string
        quantity:
          type: integer
        quantity_received:
          type: integer

    # =========================
    # TRAVEL EQUIPMENT
    # =========================
    TravelEquipment:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
      properties:
        id:
          type: string
        travel_id:
          type: string
        equipment:
          type: string
        quantity:
          type: integer
        status:
          $ref: '#/components/schemas/TransportStatus'
    CrupdateTravelEquipment:
      allOf:
        - $ref: '#/components/schemas/comment'
      properties:
        id:
          type: string
        travel_id:
          type: string
        equipment:
          type: string
        quantity:
          type: integer
        status:
          $ref: '#/components/schemas/TransportStatus'

    # =========================
    # PURCHASE
    # =========================
    Purchase:
      properties:
        id:
          type: string
        expense_id:
          type: string
        supplier:
          type: string
        equipment:
          type: string
        material:
          type: string
        quantity:
          type: integer
        is_equipment:
          type: boolean
    CrupdatePurchase:
      properties:
        id:
          type: string
        expense_id:
          type: string
        supplier:
          type: string
        equipment:
          type: string
        material:
          type: string
        quantity:
          type: integer
        is_equipment:
          type: boolean

    # =========================
    # BANK FEE
    # =========================
    BankFee:
      properties:
        id:
          type: string
        expense_id:
          type: string
        bank_name:
          type: string
        description:
          type: string
    CrupdateBankFee:
      properties:
        id:
          type: string
        expense_id:
          type: string
        bank_name:
          type: string
        description:
          type: string

    # =========================
    # OTHER EXPENSE
    # =========================
    OtherExpense:
      properties:
        id:
          type: string
        expense_id:
          type: string
        description:
          type: string
    CrupdateOtherExpense:
      properties:
        id:
          type: string
        expense_id:
          type: string
        description:
          type: string

    # =========================
    # HISTORY
    # =========================
    History:
      type: object
      properties:
        id:
          type: string
        previous_value:
          type: string
          description: "Serialized previous value of the entity"
        new_value:
          type: string
          description: "Serialized new value of the entity"
        user_id:
          type: string
          description: "ID of the user who made the modification"
        modified_at:
          type: string
          format: date-time
          description: "Date and time of the modification"
        entity_type:
          $ref: '#/components/schemas/EntityType'
        entity_id:
          type: string
          description: "ID of the modified entity"

    # =========================
    # AuthResponse
    # =========================
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        type:
          type: string
          example: Bearer
        id:
          type: string
        email:
          type: string
        role:
          type: string

    # =========================
    # LoginRequest
    # =========================
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    # =========================
    # EXCEPTIONS
    # =========================
    Page:
      type: integer
      description: Start at `1`
    PageSize:
      type: integer
      description: Cannot exceed `500`

    Exception:
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    BadRequestException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: BadRequestException
        message: Bad request
    NotAuthorizedException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: NotAuthorizedException
        message: Not authorized
    ResourceNotFoundException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: ResourceNotFoundException
        message: Resource of type <T> identified by <I> not found
    TooManyRequestsException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: TooManyRequestsException
        message: Too many requests
    InternalServerException:
      allOf:
        - $ref: '#/components/schemas/Exception'
      example:
        type: InternalServerException
        message: Unexpected error
